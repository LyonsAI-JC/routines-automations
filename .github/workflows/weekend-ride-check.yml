name: Fetch Weekend Weather

on:
  schedule:
    # Friday 08:00 Melbourne time - covers both AEST (22:00 UTC Thu)
    # and AEDT (21:00 UTC Thu). Idempotent; commit step skips if no diff.
    - cron: "0 21 * * 4"
    - cron: "0 22 * * 4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch weather
        run: python weekend-ride-checker/check_weather.py

      - name: Commit updated weather.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekend-ride-checker/weather.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update weekend ride weather"
            git push
          fi
