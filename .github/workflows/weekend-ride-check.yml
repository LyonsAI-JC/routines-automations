name: Fetch Weekend Weather

on:
  schedule:
    # Daily at 21:00 UTC = 08:00 AEDT / 07:00 AEST.
    # Refreshes weather.json each morning so the upcoming-weekend forecast
    # is always recent. Commit step is idempotent if nothing changed.
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch weather
        run: python weekend-ride-checker/check_weather.py

      - name: Commit updated weather.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weekend-ride-checker/weather.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update weekend ride weather"
            git push
          fi
